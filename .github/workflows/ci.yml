name: CI
on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
permissions:
    contents: write
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: "24.x"
            - run: npm ci
            - run: npx biome check .
            - run: npx playwright install --with-deps chromium
            - run: npm run build
            - run: npm run coverage
            - name: Update coverage badge
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              run: |
                  node scripts/generate-coverage-badge.mjs
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add badges/coverage.json
                  git diff --staged --quiet || git commit -m "Update coverage badge"
                  git push
            - name: Update benchmark results
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              run: |
                  npm run bench:update-readme
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add README.md
                  git diff --staged --quiet || git commit -m "Update benchmark results"
                  git push
